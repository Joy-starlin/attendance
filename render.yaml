services:
  - type: web
    name: bugema-attendance
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bugema-db
          property: connectionString

databases:
  - name: bugema-db
    plan: free
    databaseName: bugema_attendance
    user: bugema_user
